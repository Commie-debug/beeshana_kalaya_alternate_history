<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta prefix="ifiction: http://babel.ifarchive.org/protocol/iFiction/"
        property="ifiction:ifid" content="7FCDF039-2B77-4179-B795-CBAFA65253AA">
    <title>Beeshana Kalaya: An Alternate History - Communist45</title>
    <link rel="stylesheet" type="text/css" href="game.css">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <script src="jquery-1.11.1.min.js"></script>
    <script src="d3.v7.min.js"></script>
    <script src="d3-parliament.js"></script>
    <script src="d3-linegraph.js"></script>
    <script src="data.js"></script>
    <script src="core.js"></script>
    <script src="game.js"></script>
  </head>
  <body>

    <div id="music-controls">
        <button id="music-prev-btn" onclick="window.AudioManager.previous('music')" title="Previous Song">
            <img src="img/logos/Previous_Song.png" width="40" height="40" alt="Previous Song">
        </button>
        <button id="music-toggle-btn" onclick="window.toggleMusicButton()" title="Single-click to toggle music. Double-click to skip." aria-label="Toggle Music">
            <img id="music-on-icon" src="img/logos/Radio_On.png" width="40" height="40" alt="Music On"/>
            <img id="music-off-icon" src="img/logos/Radio_Off.png" width="40" height="40" alt="Music Off" style="display:none"/>
        </button>
        <button id="music-skip-btn" onclick="window.AudioManager.skip('music')" title="Skip Song">
            <img src="img/logos/Skip_Song.png" width="40" height="40" alt="Previous Song">
        </button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1" 
            oninput="window.AudioManager.setVolume('music', parseFloat(this.value))">
    </div>
    
    <div class="background" id="bg2">
    </div>

    <div class="background" id="bg1">
    </div>

    <div id="options" class="overlay" style="display: none;">
        <div class="overlay_top">
            <table>
                <tr>
                    <td>
                        Backgrounds:
                    </td>
                    <td>
                        <label for="backgrounds_yes">On</label>
                    </td>
                    <td>
                        <input type="radio" id="backgrounds_yes" name="backgrounds" value="1" onclick="window.enableBg();">
                    </td>
                    <td>
                        <label for="backgrounds_no">Off</label>
                    </td>
                    <td>
                        <input type="radio" id="backgrounds_no" name="backgrounds" value="0" onclick="window.disableBg();">
                    </td>
                </tr>
                <tr>
                    <td> <hr> </td>
                </tr>
                <tr>
                    <td>
                        Event images:
                    <td>
                        <label for="images_yes">On</label>
                    </td>
                    <td>
                        <input type="radio" id="images_yes" name="images" value="1" onclick="window.enableImages();">
                    </td>
                    <td>
                        <label for="images_no">Off</label>
                    </td>
                    <td>
                        <input type="radio" id="images_no" name="images" value="0" onclick="window.disableImages();">
                    </td>
                </tr>
                <tr>
                    <td> <hr> </td>
                </tr>
 
                <tr>
                    <td>
                        Animations:
                    </td>
                    <td>
                        <label for="animate_yes">On</label>
                    </td>
                    <td>
                        <input type="radio" id="animate_yes" name="animate" value="1" onclick="window.enableAnimate();">
                    </td>
                    <td>
                        <label for="animate_no">Off</label>
                    </td>
                    <td>
                        <input type="radio" id="animate_no" name="animate" value="0" onclick="window.disableAnimate();">
                    </td>
                </tr>
                <tr>
                    <td> <hr> </td>
                </tr>
                <tr>
                    </tr>
                    <tr>
                        <td>
                            Color scheme:
                        </td>
                        <td>
                            <label for="light_mode">Light mode</label>
                        </td>
                        <td>
                            <input type="radio" id="light_mode" name="ld_mode" value="1" onclick="window.enableLightMode();">
                        </td>
                        <td>
                            <label for="dark_mode">Dark mode</label>
                        </td>
                        <td>
                            <input type="radio" id="dark_mode" name="ld_mode" value="0" onclick="window.enableDarkMode();">
                        </td>
                    </tr>
                <tr>
                    <td>
                        <button onclick="window.hideOptions();">Close</button>
                    </td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                   <td>
                        <button onclick="window.showMods();">Mods</button>
                    </td>

                </tr>
            </table>
    </div>

    <!-- Sprite stuff - feel free to comment out/remove if not using -->
    <div id="contentSpriteContainer">
        <div class="sprite" id="topLeftSprite"></div>
        <div class="sprite" id="topRightSprite"></div>

        <div class="sprite" id="bottomLeftSprite"></div>
        <div class="sprite" id="bottomRightSprite"></div>
    </div>

    <div id='page'>
        <div id="mid_panel">
            <header>
                <h1 id="game-title">Beeshana Kalaya: An Alternate History</h1>
                <h2 id="game-author">Communist45</h2>

                <div id="header-links">
                    <a id="stats-link" onclick="window.showStats();" href="#">Library</a>
                    <a onclick="dendryUI.showSaveSlots();" href="#">Save/Load</a>
                    <a onclick="window.showOptions();" href="#">Options</a>
                </div>
            </header>
            <div id="tools_wrapper">
                <div id='stats_sidebar' class='tools left'>
                    <div id="qualities">
                    </div>
                    <div class="tab_container left-tabs">
                    </div>
                    <div class="tab_container right-tabs">
                        <button class="tab_button active" id="main_tab" onclick="window.changeTab('status', 'main_tab');">Main</button>
                        <button class="tab_button" id="politics_tab" onclick="window.changeTab('status.politics', 'politics_tab');">Politics</button>
                        <button class="tab_button" id="paramilitary_tab" onclick="window.changeTab('status.paramilitaries', 'paramilitary_tab');">Military</button>
                        <button class="tab_button" id="tamil_tab" onclick="window.changeTab('status.tamil', 'tamil_tab');">Tamil Situation</button>
                        <button class="tab_button" id="economy_tab" onclick="window.changeTab('status.economy', 'economy_tab');">Economy</button>
                        <button class="tab_button" id="interior_tab" onclick="window.changeTab('status.interior', 'interior_tab');">Interior Policies</button>
                        <button class="tab_button" id="foreign_tab" onclick="window.changeTab('status.foreign', 'foreign_tab');">Foreign Relations</button>
                        <button class="tab_button" id="poll_tab" onclick="window.changeTab('status.polls', 'poll_tab');">Polls</button>
                        <button class="tab_button" id="party_tab" onclick="window.changeTab('status.party', 'party_tab');">The Party</button>
                        <button class="tab_button" id="news_tab" onclick="window.changeTab('status.news', 'news_tab');">Int. News</button>
                    </div>
                </div>
                <div id="right-panel">
                    <div id="right-panel-tab-strip" onclick="window.toggleRightPanel();">
                        **Extra Information**
                    </div>
                    <div id="right-panel-body">
                        <div id="right-panel-nav">
                            <button class="tab_button active" id="nation_tab" onclick="window.switchRightPanel('status_right', 'nation_tab');">The Nation</button>
                            <button class="tab_button" id="library_tab" onclick="window.switchRightPanel('status_right.library', 'library_tab');">Library</button>
                        </div>
                        <div id="qualities_right"></div>
                    </div>
                </div>
            </div>

            <div id='content'>

            </div>

            <footer>

      <p>
        <a onclick="window.showSaveSlots();" href="#">Save/Load</a>

      </p>

            </footer>
        </div>
    </div>
  </body>
</html>
